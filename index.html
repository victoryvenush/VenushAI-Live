<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenushAI // Secure Core</title>
    <style>
        /* Mobile Warning Styles */
        #mobileNotice { display: none; position: fixed; inset: 0; background: #04060e; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        @media (max-width: 768px) { #mobileNotice { display: flex !important; } }
        /* Add your existing CSS here */
    </style>
</head>
<body>

    <div id="mobileNotice">
        <h2 style="color: #06b6d4;">Interface Notice</h2>
        <p style="color: white;">Please enable "Desktop Site" mode for the best experience.</p>
    </div>

    <div id="app">
        <textarea id="userInput" placeholder="Ask anything..."></textarea>
        <button id="sendBtn">SEND</button>
        <div id="chatWindow"></div>
    </div>

    <script>
        // SECURE API LOGIC
        async function getResponse(userMessage) {
            // Check if key exists in browser storage
            let apiKey = localStorage.getItem('groq_key');
            
            if (!apiKey) {
                apiKey = prompt("Enter your Groq API Key (This is saved only on your browser):");
                if (apiKey) localStorage.setItem('groq_key', apiKey);
                else return;
            }

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: userMessage }]
                })
            });
            
            const data = await response.json();
            return data.choices[0].message.content;
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('userInput').value;
            const output = await getResponse(input);
            document.getElementById('chatWindow').innerText = output;
        };
    </script>
</body>
</html>
